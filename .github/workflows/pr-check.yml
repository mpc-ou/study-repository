name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const requiredChecks = [
              'Tôi đã kiểm tra lint',
              'Tôi đã thử build local',
              'Tôi đã tuân thủ format'
            ];
            const missing = requiredChecks.filter(check => {
              const pattern = new RegExp(`\\[x\\].*${check.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}`, 'i');
              return !pattern.test(body);
            });
            if (missing.length > 0) {
              core.setFailed(
                `PR description is missing required checkboxes:\n${missing.map(m => `  - ${m}`).join('\n')}\n\nPlease update your PR description using the PR template.`
              );
            }

  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  build:
    name: Test Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Verify output
        run: |
          test -f .dist/main.json && echo "✅ main.json exists" || (echo "❌ main.json missing" && exit 1)
          test -d .dist/courses && echo "✅ courses/ exists" || (echo "❌ courses/ missing" && exit 1)
          test -d .dist/data && echo "✅ data/ exists" || (echo "❌ data/ missing" && exit 1)
